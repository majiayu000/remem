name: Sensitive Governance Advisory

on:
  pull_request_target:
    types: [opened, synchronize, reopened, edited, ready_for_review]

# This repository-local workflow is intentionally read-only and advisory. A
# GitHub App or organization required workflow is the T6 trust root for final
# governance authorization; in-repository workflow files remain PR-changeable.
permissions:
  contents: read
  pull-requests: read

jobs:
  classify:
    runs-on: ubuntu-latest
    concurrency:
      group: sensitive-governance-advisory-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    steps:
      - name: Check out trusted pull request base
        uses: actions/checkout@v6.0.2
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          persist-credentials: false

      - name: Fetch changed paths through GitHub API
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          mkdir -p .specrail/runtime
          gh api --paginate --slurp \
            "repos/$GITHUB_REPOSITORY/pulls/$PR_NUMBER/files" \
            > .specrail/runtime/sensitive-governance-files.json

      - name: Run trusted-base sensitive classification advisory
        env:
          TRUSTED_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import re
          import sys
          from pathlib import Path

          sys.path.insert(0, "checks")
          from sensitive_enforcement import classify_sensitive_changes
          from specrail_lib import load_pack

          base_sha = os.environ["TRUSTED_BASE_SHA"]
          if re.fullmatch(r"[0-9a-f]{40}", base_sha) is None:
              raise SystemExit("pull request base SHA is not a full trusted commit SHA")

          pages = json.loads(
              Path(".specrail/runtime/sensitive-governance-files.json").read_text()
          )
          if not isinstance(pages, list) or any(not isinstance(page, list) for page in pages):
              raise SystemExit("GitHub changed-files response has an unexpected shape")
          paths = []
          for page in pages:
              for item in page:
                  filename = item.get("filename") if isinstance(item, dict) else None
                  if not isinstance(filename, str) or not filename:
                      raise SystemExit("GitHub changed-files entry is missing filename")
                  paths.append(filename)

          classification = classify_sensitive_changes(
              load_pack(Path(".")),
              Path("."),
              paths,
              paths,
              source="github_changed_files",
          )
          result = {
              "schema_version": 1,
              "repository": os.environ["GITHUB_REPOSITORY"],
              "pr_number": int(os.environ["PR_NUMBER"]),
              "trusted_base_sha": base_sha,
              "classification": classification,
              "authorization": "advisory_only",
              "final_trust_root": "external_github_app_or_org_required_workflow_t6",
              "ordinary_pr_ci_is_final_authorization": False,
          }
          output = Path(".specrail/runtime/sensitive-governance-advisory.json")
          output.write_text(json.dumps(result, indent=2) + "\n")
          with Path(os.environ["GITHUB_STEP_SUMMARY"]).open("a", encoding="utf-8") as summary:
              summary.write("## Sensitive governance advisory\n\n")
              summary.write(f"- enforcement-sensitive: `{classification['enforcement_sensitive']}`\n")
              summary.write(f"- trusted base: `{base_sha}`\n")
              summary.write("- authorization: `advisory_only`\n")
              summary.write("- final trust root: external GitHub App or organization required workflow (T6)\n")
              summary.write("- ordinary PR CI is not final governance authorization\n")
          PY

      - name: Upload advisory evidence
        uses: actions/upload-artifact@v4
        with:
          name: sensitive-governance-advisory-pr-${{ github.event.pull_request.number }}
          path: .specrail/runtime/sensitive-governance-advisory.json
          if-no-files-found: error
