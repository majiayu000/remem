[package]
name = "remem"
version = "0.2.0"
edition = "2021"
description = "Persistent memory for Claude Code — single binary, zero subprocesses"
license = "MIT"
repository = "https://github.com/majiayu000/remem"
homepage = "https://github.com/majiayu000/remem"
readme = "README.md"
keywords = ["claude-code", "memory", "mcp", "ai", "persistent-memory"]
categories = ["command-line-utilities", "database"]

[dependencies]
clap = { version = "4", features = ["derive"] }
rusqlite = { version = "0.32", features = ["bundled"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
chrono = { version = "0.4", features = ["serde"] }
dirs = "6"
anyhow = "1"
tokio = { version = "1", features = ["full"] }
rmcp = { version = "0.15", features = ["server", "transport-io", "macros"] }
reqwest = { version = "0.12", features = ["json"] }

[profile.release]
opt-level = "z"
lto = true
strip = true
